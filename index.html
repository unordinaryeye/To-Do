<div id="toast-root"></div>
<input type="file" id="restoreInput" accept=".json">

<script>
// ★★★ 여기에 Firebase 설정을 붙여넣으세요 ★★★
const firebaseConfig = {
  apiKey: "AIzaSyAe7avifEe4sKx_JS6oe6CEcX9UCEKTzXQ",
  authDomain: "daily-routine-1fbd8.firebaseapp.com",
  projectId: "daily-routine-1fbd8",
  storageBucket: "daily-routine-1fbd8.firebasestorage.app",
  messagingSenderId: "139544196262",
  appId: "1:139544196262:web:ceb8876580071b6368f067"
};

// ── Firebase Init ──
let db = null;
let unsubscribe = null;
let syncConnected = false;
let firebaseReady = false;
let skipNextSync = false;

try {
  if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    firebaseReady = true;
  }
} catch(e) { console.warn("Firebase init failed:", e); }

// ── Constants ──
const DAYS_KR=["일","월","화","수","목","금","토"];
const CATEGORIES=[
  {id:"morning",label:"🌅 모닝 루틴",color:"#F59E0B"},
  {id:"work",label:"💼 업무",color:"#3B82F6"},
  {id:"health",label:"💪 건강",color:"#10B981"},
  {id:"evening",label:"🌙 이브닝 루틴",color:"#8B5CF6"},
  {id:"selfcare",label:"🧘 셀프케어",color:"#EC4899"},
  {id:"study",label:"📚 학습",color:"#F97316"},
];
const DEFAULT_ROUTINES=[
  {id:"r1",text:"물 한 잔 마시기",category:"morning",emoji:"💧"},
  {id:"r2",text:"10분 스트레칭",category:"morning",emoji:"🤸"},
  {id:"r3",text:"감사 일기 쓰기",category:"morning",emoji:"📝"},
  {id:"r4",text:"30분 운동",category:"health",emoji:"🏃"},
  {id:"r5",text:"독서 30분",category:"evening",emoji:"📖"},
  {id:"r6",text:"내일 할 일 정리",category:"evening",emoji:"📋"},
];
const EMOJI_OPTIONS=["✅","💧","🤸","📝","🏃","📖","📋","🧘","💪","🎯","🧠","💊","🥗","☕","🛌","🎵","🖊️","💻","🌿","🙏"];
const TODO_COLOR="#6366F1";

// ── State ──
let routines=JSON.parse(localStorage.getItem("routines")||"null")||[...DEFAULT_ROUTINES];
let checks=JSON.parse(localStorage.getItem("checks")||"{}");
let todos=JSON.parse(localStorage.getItem("todos")||"{}");
let selectedDate=new Date();
let view="daily",editingId=null,showEmojiPicker=false,showSettings=false,showConfirm=false;
let newRoutine={text:"",category:"morning",emoji:"✅"};
let todoInput="";
let editingTodoId=null;
let syncCode=localStorage.getItem("syncCode")||"";
let syncInput="";
let showSyncPanel=false;

// ── Save & Sync ──
function saveLocal(){
  localStorage.setItem("routines",JSON.stringify(routines));
  localStorage.setItem("checks",JSON.stringify(checks));
  localStorage.setItem("todos",JSON.stringify(todos));
}

let syncTimeout=null;
function save(){
  saveLocal();
  if(syncCode&&firebaseReady&&!skipNextSync){
    clearTimeout(syncTimeout);
    syncTimeout=setTimeout(()=>pushToFirebase(),500);
  }
}

function pushToFirebase(){
  if(!db||!syncCode)return;
  db.collection("sync").doc(syncCode).set({
    routines,checks,todos,
    lastUpdated:firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e=>console.warn("Sync push failed:",e));
}

function startSync(code){
  if(!firebaseReady){toast("⚠️","Firebase가 설정되지 않았어요");return}
  if(unsubscribe)unsubscribe();
  syncCode=code;
  localStorage.setItem("syncCode",code);
  syncConnected=true;
  
  unsubscribe=db.collection("sync").doc(code).onSnapshot(snap=>{
    if(!snap.exists)return;
    const data=snap.data();
    if(!data.routines)return;
    
    const local=JSON.stringify({routines,checks,todos});
    const remote=JSON.stringify({routines:data.routines,checks:data.checks,todos:data.todos||{}});
    if(local===remote)return;
    
    skipNextSync=true;
    routines=data.routines;
    checks=data.checks;
    todos=data.todos||{};
    saveLocal();
    render();
    setTimeout(()=>{skipNextSync=false},1000);
  },err=>{
    console.warn("Sync listen error:",err);
    syncConnected=false;
    render();
  });
  
  render();
}

function stopSync(){
  if(unsubscribe)unsubscribe();
  unsubscribe=null;
  syncCode="";
  syncConnected=false;
  localStorage.removeItem("syncCode");
  toast("🔓","동기화가 해제되었어요");
  render();
}

function generateCode(){
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let code="";
  for(let i=0;i<6;i++)code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function createSync(){
  const code=generateCode();
  pushToFirebaseWithCode(code).then(()=>{
    startSync(code);
    toast("✅","동기화 코드가 생성되었어요");
  }).catch(()=>toast("❌","동기화 생성에 실패했어요"));
}

function pushToFirebaseWithCode(code){
  return db.collection("sync").doc(code).set({
    routines,checks,todos,
    lastUpdated:firebase.firestore.FieldValue.serverTimestamp()
  });
}

function joinSync(){
  const code=syncInput.trim().toUpperCase();
  if(code.length!==6){toast("⚠️","6자리 코드를 입력해주세요");return}
  db.collection("sync").doc(code).get().then(snap=>{
    if(snap.exists){
      const data=snap.data();
      routines=data.routines||routines;
      checks=data.checks||checks;
      todos=data.todos||todos;
      saveLocal();
      startSync(code);
      toast("✅","동기화 연결 완료!");
    }else{
      toast("❌","존재하지 않는 코드예요");
    }
  }).catch(()=>toast("❌","연결에 실패했어요"));
}

// Auto-reconnect on load
if(syncCode&&firebaseReady){startSync(syncCode)}

// ── Helpers ──
function getLastBackup(){return localStorage.getItem("lastBackup")||null}
function setLastBackup(){localStorage.setItem("lastBackup",new Date().toISOString())}
function needsReminder(){if(syncCode)return false;const l=getLastBackup();if(!l)return Object.keys(checks).length>3;return(Date.now()-new Date(l).getTime())/(1e3*3600*24)>7}
function fmtBack(iso){if(!iso)return"백업한 적 없음";const d=new Date(iso);return`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`}

let toastT=null;
function toast(emoji,msg){const r=document.getElementById("toast-root");r.innerHTML=`<div class="toast" id="at">${emoji} ${msg}</div>`;clearTimeout(toastT);toastT=setTimeout(()=>{const t=document.getElementById("at");if(t){t.classList.add("out");setTimeout(()=>r.innerHTML="",300)}},2500)}

function doBackup(){
  const data={routines,checks,todos,exportedAt:new Date().toISOString(),version:2};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");const d=new Date();
  a.href=url;a.download=`루틴백업_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.json`;
  a.click();URL.revokeObjectURL(url);setLastBackup();showSettings=false;toast("✅","백업 파일이 저장되었어요");render();
}
function doRestore(){document.getElementById("restoreInput").click()}
document.getElementById("restoreInput").addEventListener("change",function(e){
  const f=e.target.files[0];if(!f)return;const reader=new FileReader();
  reader.onload=function(ev){try{const data=JSON.parse(ev.target.result);if(!data.routines||!data.checks)throw 0;routines=data.routines;checks=data.checks;if(data.todos)todos=data.todos;save();showSettings=false;toast("✅","데이터가 복원되었어요!");render()}catch{toast("❌","파일을 읽을 수 없어요")}};
  reader.readAsText(f);e.target.value="";
});
function doReset(){routines=[...DEFAULT_ROUTINES];checks={};todos={};localStorage.removeItem("lastBackup");save();showConfirm=false;showSettings=false;toast("🔄","초기화 완료");render()}

function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`}
function fmtKR(d){return`${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS_KR[d.getDay()]})`}
function isToday(d){return fmt(d)===fmt(new Date())}
function dateKey(){return fmt(selectedDate)}
function getProgress(){const dc=checks[dateKey()]||{};const rd=routines.filter(r=>dc[r.id]).length;const dt=todos[dateKey()]||[];const td=dt.filter(t=>t.done).length;const total=routines.length+dt.length;return{done:rd+td,total,pct:total?((rd+td)/total*100):0}}
function getStreak(){let s=0;const d=new Date(selectedDate);for(let i=0;i<365;i++){const k=fmt(d);const dc=checks[k]||{};const a=routines.length>0&&routines.every(r=>dc[r.id]);if(i===0&&!a){d.setDate(d.getDate()-1);continue}if(i>0&&!a)break;if(a)s++;d.setDate(d.getDate()-1)}return s}
function getWeek(){const ds=[];const s=new Date(selectedDate);s.setDate(s.getDate()-3);for(let i=0;i<7;i++){const d=new Date(s);d.setDate(d.getDate()+i);ds.push(d)}return ds}
function grouped(){return CATEGORIES.map(c=>({...c,items:routines.filter(r=>r.category===c.id)})).filter(g=>g.items.length>0)}

function toggleCheck(id){const k=dateKey();if(!checks[k])checks[k]={};checks[k][id]=!checks[k][id];save();render()}
function addRoutine(){if(!newRoutine.text.trim())return;routines.push({id:"r"+Date.now(),...newRoutine});newRoutine={text:"",category:"morning",emoji:"✅"};showEmojiPicker=false;save();render()}
function deleteRoutine(id){routines=routines.filter(r=>r.id!==id);save();render()}
function moveDate(n){selectedDate.setDate(selectedDate.getDate()+n);selectedDate=new Date(selectedDate);render()}
function addTodo(){if(!todoInput.trim())return;const k=dateKey();if(!todos[k])todos[k]=[];todos[k].push({id:"t"+Date.now(),text:todoInput.trim(),done:false});todoInput="";save();render();setTimeout(()=>{const el=document.getElementById("todoInputField");if(el)el.focus()},50)}
function toggleTodo(id){const k=dateKey();const item=(todos[k]||[]).find(t=>t.id===id);if(item)item.done=!item.done;save();render()}
function deleteTodo(id){const k=dateKey();todos[k]=(todos[k]||[]).filter(t=>t.id!==id);if(todos[k].length===0)delete todos[k];save();render()}
function updateTodoText(id,text){const item=(todos[dateKey()]||[]).find(t=>t.id===id);if(item)item.text=text}

// ── Render ──
function render(){
const app=document.getElementById("app"),ov=document.getElementById("overlay-root");
const p=getProgress(),week=getWeek(),dk=dateKey(),totalDays=Object.keys(checks).length,dayTodos=todos[dk]||[];
const syncStatus=syncCode?(syncConnected?"online":"offline"):"none";
const syncLabel=syncCode?(syncConnected?"동기화 연결됨":"오프라인"):"";

let h=`<div class="header"><div class="header-top"><div><h1>Daily Routine</h1><p class="subtitle">${syncCode?`<span class="sync-dot ${syncStatus}"></span> ${syncLabel}`:"매일의 작은 습관이 큰 변화를 만듭니다"}</p></div><div class="header-right"><div class="tabs"><button class="tab-btn ${view==="daily"?"active":""}" onclick="view='daily';render()">체크리스트</button><button class="tab-btn ${view==="routines"?"active":""}" onclick="view='routines';render()">루틴 관리</button></div><button class="settings-btn" onclick="showSettings=true;render()">⚙️</button></div></div>`;

if(view==="daily"){
h+=`<div class="fade-in"><div class="date-nav"><button class="arrow" onclick="moveDate(-1)">‹</button><span class="date-text">${fmtKR(selectedDate)}</span><button class="arrow" onclick="moveDate(1)">›</button>${!isToday(selectedDate)?'<button class="today-btn" onclick="selectedDate=new Date();render()">오늘</button>':''}</div><div class="week-row">`;
week.forEach(d=>{const k=fmt(d),dc=checks[k]||{},done=routines.length>0&&routines.every(r=>dc[r.id]),partial=routines.some(r=>dc[r.id]),sel=k===dk,dot=done?"#10B981":partial?"#F59E0B":"#E7E5E4";
h+=`<button class="week-day ${sel?"selected":""}" onclick="selectedDate=new Date('${d.toISOString()}');render()"><span class="lbl">${DAYS_KR[d.getDay()]}</span><span class="num">${d.getDate()}</span><div class="dot" style="background:${dot}"></div></button>`});
h+=`</div></div>`}
h+=`</div>`;

if(view==="daily"){
const pc=p.pct===100?"#10B981":p.pct>50?"#F59E0B":"#EF4444";
h+=`<div class="content fade-in">`;
if(needsReminder())h+=`<div class="backup-banner" onclick="showSettings=true;render()"><span style="font-size:22px">💾</span><div><div style="font-size:13px;color:#92400E">데이터 백업을 해두면 안전해요</div><div style="font-size:12px;color:#D97706;font-weight:600;margin-top:2px">탭해서 백업하기 →</div></div></div>`;
h+=`<div class="stats"><div class="stat-card" style="flex:1"><div class="label">진행률</div><div style="display:flex;align-items:center;gap:10px"><div class="progress-track"><div class="progress-fill progress-bar" style="width:${p.pct}%;background:${pc}"></div></div><span class="stat-number">${p.done}/${p.total}</span></div></div><div class="stat-card" style="min-width:80px;text-align:center"><div class="label">연속</div><div><span class="streak-number">${getStreak()}</span><span class="streak-unit">일</span></div></div></div>`;

const gs=grouped(),tc=checks[dk]||{};
gs.forEach((g,gi)=>{
h+=`<div class="group slide-in" style="animation-delay:${gi*.05}s"><div class="group-header"><div class="group-bar" style="background:${g.color}"></div><span class="group-label">${g.label}</span><span class="group-count">${g.items.filter(r=>tc[r.id]).length}/${g.items.length}</span></div><div class="group-card">`;
g.items.forEach(r=>{const c=!!tc[r.id];
h+=`<div class="routine-item" onclick="toggleCheck('${r.id}')"><div class="checkbox ${c?"checked check-pop":"unchecked"}" style="${c?"background:"+g.color:""}">${c?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div><span class="routine-emoji">${r.emoji}</span><span class="routine-text ${c?"done":""}">${r.text}</span></div>`});
h+=`</div></div>`});

// Daily todos
h+=`<div class="group slide-in" style="animation-delay:${gs.length*.05}s;margin-top:24px"><div class="group-header"><div class="group-bar" style="background:${TODO_COLOR}"></div><span class="group-label">📌 오늘의 할 일</span><span class="group-count">${dayTodos.filter(t=>t.done).length}/${dayTodos.length}</span></div>`;
if(dayTodos.length>0){h+=`<div class="group-card">`;
dayTodos.forEach(t=>{
h+=`<div class="routine-item"><div class="checkbox ${t.done?"checked check-pop":"unchecked"}" style="${t.done?"background:"+TODO_COLOR:""}" onclick="toggleTodo('${t.id}')">${t.done?'<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div>`;
if(editingTodoId===t.id){h+=`<input class="edit-input" id="editTodo-${t.id}" value="${t.text}" oninput="updateTodoText('${t.id}',this.value)" onblur="editingTodoId=null;save();render()" onkeydown="if(event.key==='Enter'){editingTodoId=null;save();render()}">`}
else{h+=`<span class="routine-text ${t.done?"done":""}" style="flex:1;cursor:text" onclick="event.stopPropagation();editingTodoId='${t.id}';render();setTimeout(()=>{const el=document.getElementById('editTodo-${t.id}');if(el)el.focus()},50)">${t.text}</span>`}
h+=`<button class="todo-delete" onclick="event.stopPropagation();deleteTodo('${t.id}')">×</button></div>`});
h+=`</div>`}
h+=`<div style="display:flex;gap:8px;margin-top:8px"><input id="todoInputField" class="text-input" style="height:38px;font-size:13px" value="${todoInput}" placeholder="할 일을 입력하세요" oninput="todoInput=this.value" onkeydown="if(event.key==='Enter')addTodo()"><button class="add-btn" style="padding:0 16px;height:38px" onclick="addTodo()">추가</button></div></div>`;

if(!routines.length&&!dayTodos.length)h+=`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">📋</div><p style="font-size:14px;margin-bottom:4px">등록된 루틴이 없습니다</p><p style="font-size:12px"><span onclick="view='routines';render()" style="color:#1C1917;font-weight:600;cursor:pointer;text-decoration:underline">루틴 관리</span>에서 추가해보세요</p></div>`;
if(p.pct===100&&p.total>0)h+=`<div class="complete-banner fade-in"><div style="font-size:36px;margin-bottom:8px">🎉</div><p style="font-size:15px;font-weight:600;color:#166534">오늘 할 일 모두 완료!</p><p style="font-size:12px;color:#4ADE80;margin-top:4px">대단해요, 꾸준함이 실력입니다</p></div>`;
h+=`</div>`}

if(view==="routines"){
h+=`<div class="content fade-in"><div class="add-form"><div class="title">새 루틴 추가</div><div class="add-row"><div style="position:relative"><button class="emoji-btn" onclick="showEmojiPicker=!showEmojiPicker;render()">${newRoutine.emoji}</button>${showEmojiPicker?`<div class="emoji-picker">${EMOJI_OPTIONS.map(e=>`<button class="emoji-option ${newRoutine.emoji===e?"selected":""}" onclick="newRoutine.emoji='${e}';showEmojiPicker=false;render()">${e}</button>`).join("")}</div>`:""}</div><input class="text-input" value="${newRoutine.text}" placeholder="루틴 이름을 입력하세요" oninput="newRoutine.text=this.value" onkeydown="if(event.key==='Enter')addRoutine()"></div><div style="display:flex;gap:8px;align-items:center"><select class="select-input" onchange="newRoutine.category=this.value">${CATEGORIES.map(c=>`<option value="${c.id}" ${newRoutine.category===c.id?"selected":""}>${c.label}</option>`).join("")}</select><button class="add-btn" onclick="addRoutine()">추가</button></div></div>`;
grouped().forEach((g,gi)=>{
h+=`<div class="group slide-in" style="animation-delay:${gi*.05}s"><div class="group-header"><div class="group-bar" style="background:${g.color}"></div><span class="group-label">${g.label}</span><span class="group-count">(${g.items.length})</span></div><div class="group-card">`;
g.items.forEach(r=>{
h+=`<div class="routine-item"><span class="routine-emoji" style="font-size:16px">${r.emoji}</span>${editingId===r.id?`<input class="edit-input" id="edit-${r.id}" value="${r.text}" oninput="routines.find(x=>x.id==='${r.id}').text=this.value" onblur="editingId=null;save();render()" onkeydown="if(event.key==='Enter'){editingId=null;save();render()}">`:`<span class="routine-text" style="flex:1;cursor:text" onclick="editingId='${r.id}';render();setTimeout(()=>{const el=document.getElementById('edit-${r.id}');if(el)el.focus()},50)">${r.text}</span>`}<button class="delete-btn" onclick="event.stopPropagation();deleteRoutine('${r.id}')">×</button></div>`});
h+=`</div></div>`});
if(!routines.length)h+=`<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">🌱</div><p style="font-size:14px">위에서 첫 번째 루틴을 추가해보세요</p></div>`;
h+=`</div>`}

app.innerHTML=h;

// ── Settings Overlay ──
if(showSettings){
let syncHtml="";
if(!firebaseReady){
  syncHtml=`<div class="sync-section" style="background:#FEF2F2;border-color:#FECACA"><div class="sec-title" style="color:#DC2626">⚠️ Firebase 미설정</div><p style="font-size:12px;color:#92400E;line-height:1.5">index.html 상단의 firebaseConfig에<br>Firebase 프로젝트 정보를 입력해주세요.</p></div>`;
} else if(syncCode){
  syncHtml=`<div class="sync-section"><div class="sec-title">🔗 동기화 연결됨</div><div class="sync-code-display">${syncCode}</div><p class="sync-status"><span class="sync-dot ${syncConnected?"online":"offline"}" style="vertical-align:middle"></span> ${syncConnected?"실시간 동기화 중":"재연결 시도 중..."}</p><button class="sync-btn sync-btn-disconnect" onclick="stopSync()">동기화 해제</button></div>`;
} else {
  syncHtml=`<div class="sync-section"><div class="sec-title">🔗 기기 동기화</div><button class="sync-btn sync-btn-primary" onclick="createSync()">새 코드 생성</button><div style="display:flex;align-items:center;gap:10px;margin:14px 0 6px"><div style="flex:1;height:1px;background:#BAE6FD"></div><span style="font-size:11px;color:#0284C7">또는 코드 입력</span><div style="flex:1;height:1px;background:#BAE6FD"></div></div><input class="sync-input" placeholder="6자리 코드" maxlength="6" value="${syncInput}" oninput="syncInput=this.value.toUpperCase()"><button class="sync-btn sync-btn-secondary" onclick="joinSync()">연결</button></div>`;
}

ov.innerHTML=`<div class="overlay" onclick="if(event.target===this){showSettings=false;render()}"><div class="settings-panel"><div class="panel-handle"></div><div style="display:flex;align-items:center;justify-content:center;position:relative;margin-bottom:20px"><div class="panel-title" style="margin-bottom:0">설정</div><button onclick="showSettings=false;render()" style="position:absolute;right:0;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:8px;border:1px solid #E7E5E4;background:#F5F5F4;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#78716C">✕</button></div>
${syncHtml}
<div class="section-divider"></div>
<div class="settings-item" onclick="doBackup()"><div class="si-icon" style="background:#DBEAFE">💾</div><div class="si-text"><div class="main">데이터 백업</div><div class="sub">파일로 백업 · 마지막: ${fmtBack(getLastBackup())}</div></div></div>
<div class="settings-item" onclick="doRestore()"><div class="si-icon" style="background:#FEF3C7">📂</div><div class="si-text"><div class="main">데이터 복원</div><div class="sub">백업 파일에서 복원</div></div></div>
<div class="settings-item settings-info"><div class="si-icon" style="background:#F3E8FF">📊</div><div class="si-text"><div class="main">내 기록</div><div class="sub">루틴 ${routines.length}개 · 기록된 날 ${totalDays}일</div></div></div>
<div style="height:8px"></div>
<div class="settings-item settings-danger" onclick="showSettings=false;showConfirm=true;render()"><div class="si-icon" style="background:#FEE2E2">🗑️</div><div class="si-text"><div class="main">전체 초기화</div><div class="sub">모든 데이터 삭제</div></div></div>
<button onclick="showSettings=false;render()" style="width:100%;padding:14px;border-radius:12px;border:1px solid #E7E5E4;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;color:#57534E;margin-top:10px;transition:all .2s">닫기</button>
</div></div>`}
else if(showConfirm){
ov.innerHTML=`<div class="overlay center" onclick="if(event.target===this){showConfirm=false;render()}"><div class="confirm-box"><div style="font-size:36px;margin-bottom:12px">⚠️</div><div class="msg">모든 루틴과 기록이 삭제됩니다.<br>정말 초기화할까요?</div><div class="btns"><button class="btn-cancel" onclick="showConfirm=false;render()">취소</button><button class="btn-danger" onclick="doReset()">초기화</button></div></div></div>`}
else{ov.innerHTML=""}
}

render();
</script>
</body>
</html>
